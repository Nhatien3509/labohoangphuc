# ============================================================================
# Full-stack production (Postgres + Backend Go + Frontend Next.js).
# Dùng để chạy thử toàn bộ trên 1 máy/VPS:
#     cd deploy && cp .env.production.example .env && docker compose up -d --build
#
# Trên VIBE HOSTING: KHÔNG dùng file này trực tiếp. Mỗi service trỏ thẳng tới
# Dockerfile.backend / Dockerfile.frontend ở root repo, và Postgres dùng dịch vụ
# PostgreSQL quản lý của Mắt Bão (xem deploy/VIBE-HOSTING.md).
# ============================================================================
services:
  # ==========================================
  # 1. DATABASE: POSTGRESQL
  # (Trên Vibe Hosting thay bằng PostgreSQL quản lý.)
  # ==========================================
  postgres:
    image: postgres:15-alpine
    container_name: labo_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-SecretPassword2026}
      POSTGRES_DB: ${DB_NAME:-labo_warranty_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - labo_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==========================================
  # 2. BACKEND: GO API  (Dockerfile.backend ở root repo)
  # ==========================================
  backend:
    build:
      context: ..
      dockerfile: Dockerfile.backend
    container_name: labo_backend
    restart: always
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      - APP_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-SecretPassword2026}
      - DB_NAME=${DB_NAME:-labo_warranty_db}
      - DB_SSL_MODE=disable
      - JWT_SECRET=${JWT_SECRET:-change_me_in_production}
      # Tạo admin lần đầu (nhớ đổi mật khẩu sau khi đăng nhập)
      - SEED_ADMIN_EMAIL=${SEED_ADMIN_EMAIL:-admin@labo.vn}
      - SEED_ADMIN_PASSWORD=${SEED_ADMIN_PASSWORD:-Admin@123}
    networks:
      - labo_network
    depends_on:
      postgres:
        condition: service_healthy

  # ==========================================
  # 3. FRONTEND: NEXT.JS  (Dockerfile.frontend ở root repo)
  # ==========================================
  frontend:
    build:
      context: ..
      dockerfile: Dockerfile.frontend
    container_name: labo_frontend
    restart: always
    ports:
      - "${WEB_PORT:-3600}:3600"
    environment:
      # FE gọi BE qua mạng nội bộ docker (tên service "backend")
      - BACKEND_URL=http://backend:8080
    networks:
      - labo_network
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local

networks:
  labo_network:
    driver: bridge
