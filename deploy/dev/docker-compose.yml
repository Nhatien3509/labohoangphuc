# ============================================================================
# Bộ hạ tầng DEV để test local (chỉ Postgres — đã bỏ Redis).
# Cấu hình KHỚP với giá trị mặc định trong labo-warranty/internal/config/config.go
# (DB cổng 5434, db=labo_warranty, user=postgres, pass=secret) để
# chạy backend bằng `go run ./cmd/api` mà không cần file .env.
#
#   cd deploy/dev && docker compose up -d
#
# Lần đầu khởi tạo sẽ tự nạp init/*.sql (schema + dữ liệu mẫu).
# Muốn nạp lại từ đầu: docker compose down -v && docker compose up -d
# ============================================================================
services:
  postgres:
    image: postgres:15-alpine
    container_name: labo_dev_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: labo_warranty
    ports:
      - "5434:5432"
    volumes:
      - labo_dev_pg:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d labo_warranty"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  labo_dev_pg:
