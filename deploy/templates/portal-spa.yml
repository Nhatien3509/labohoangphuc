services:
  thcs-portal-spa:
    container_name: thcs-portal-spa
    image: ${IMAGE_THCS_PORTAL_SPA:-thcs-portal-spa:latest}
    build:
      context: ../../src/web/portal-spa
      dockerfile: ../../../deploy/docker/portal-spa/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.portal-spa
    ports:
      - "${APP_PORT:-3000}:3000"
    networks:
      - thcs-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  thcs-net:
    name: thcs-net
    external: true
