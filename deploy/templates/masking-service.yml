services:
  thcs-masking-service:
    container_name: thcs-masking-service
    image: ${IMAGE_THCS_MASKING_SERVICE:-thcs-masking-service:latest}
    build:
      context: ../../src/services/masking-service
      dockerfile: ../../../deploy/docker/masking-service/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.masking-service
    ports:
      - "${APP_PORT:-8080}:8080"
    networks:
      - thcs-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  thcs-net:
    name: thcs-net
    external: true
