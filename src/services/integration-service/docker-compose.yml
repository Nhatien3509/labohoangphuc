# ============================================================
# dmst-integration-ingest — Demo Stack
#
# External dependencies (already deployed on 160.191.32.193):
#   Kafka UI:    http://160.191.32.193:8190
#   SigNoz UI:   http://160.191.32.193:3301
#   OTLP gRPC:   160.191.32.193:4317
#
# Local services:
#   postgres         :5433 (host) <- 5432 (container)
#   mock-datasource  :8090
#   ingest           :8081
#
# Usage:
#   docker compose up --build
# ============================================================

networks:
  dmst_ingest_demo:
    driver: bridge

services:

  # ----------------------------------------------------------
  # PostgreSQL — luu trang thai Job va Datasource
  # ----------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: dmst-ingest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: ingest_db
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ingest_db"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - dmst_ingest_demo

  # ----------------------------------------------------------
  # Mock Datasource — API gia lap nguon du lieu DMST
  # Endpoints:
  #   GET /health
  #   GET /api/v1/projects
  #   GET /api/v1/experts
  #   GET /api/v1/submissions
  # ----------------------------------------------------------
  mock-datasource:
    build:
      context: ./mock-datasource
      dockerfile: Dockerfile
    container_name: dmst-mock-datasource
    restart: unless-stopped
    environment:
      SEED_PROJECTS: "5000"
      SEED_EXPERTS: "5000"
      SEED_SUBMISSIONS: "5000"
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8090/health | grep -q ok || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - dmst_ingest_demo

  # ----------------------------------------------------------
  # dmst-integration-ingest — Service thu thap chinh
  # Ket noi:
  #   - postgres (noi bo)
  #   - Kafka:    160.191.32.193:19193,29293,39393
  #   - SigNoz:   160.191.32.193:4317 (OTLP gRPC)
  # ----------------------------------------------------------
  dmst-ingest-services:
    build:
      context: .
      dockerfile: Dockerfile.demo
    container_name: dmst-ingest-services
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mock-datasource:
        condition: service_healthy
    env_file: .env
    ports:
      - "8081:8081"
    networks:
      - dmst_ingest_demo
