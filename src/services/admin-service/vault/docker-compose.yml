version: "3.8"

services:
  vault:
    image: hashicorp/vault:1.21
    container_name: vault-server
    # Chạy entrypoint.sh với root để tự động chown /vault/data,
    # sau đó entrypoint tự drop xuống vault user qua su-exec.
    # Đây là pattern chuẩn của hashicorp/vault image.
    user: "0"
    ports:
      - "8200:8200"
      - "8201:8201"
    environment:
      # Địa chỉ để các node/client giao tiếp với API.
      # Lưu ý: Dùng 127.0.0.1 cho môi trường dev local.
      # Nếu cần expose ra ngoài host (ví dụ: nhiều container khác), đổi thành http://0.0.0.0:8200
      - VAULT_API_ADDR=http://127.0.0.1:8200
    volumes:
      # Map thư mục config bên ngoài vào trong container
      - ./config:/vault/config
      - ./policies:/vault/policies # Thêm dòng này để đưa file policy vào container

      # Mount volume để lưu trữ dữ liệu Database (Raft) không bị mất khi xóa container
      - vault-data:/vault/file
    cap_add:
      # [QUAN TRỌNG NHẤT]: Cấp quyền mlock cho container.
      # Giúp Vault khóa bộ nhớ RAM, ngăn không cho OS ghi secret xuống file Swap trên ổ cứng.
      - IPC_LOCK
    # Khởi chạy Vault ở chế độ Server (entrypoint tự động load config từ thư mục /vault/config)
    command: server
    restart: unless-stopped

volumes:
  vault-data:
    name: vault-data-volume
